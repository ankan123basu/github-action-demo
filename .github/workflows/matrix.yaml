name: Matrix Demo

on:
  push:

jobs:
  test:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [17, 21]

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - run: java -version